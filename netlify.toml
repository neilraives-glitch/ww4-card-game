[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/ww4-multiplayer.html"
  [headers.values]
    Cache-Control = "no-cache"

# Card and title artwork is versioned in the URL (ART_V in the game scripts),
# so a long cache is safe: changing a picture changes its URL. Without this
# Netlify's default caching left returning players on the old card back.
[[headers]]
  for = "/cards/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/art/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
